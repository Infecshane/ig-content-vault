const iconMap = icons;

function IconComponent({ name, className }) {
  const Icon = iconMap[name] || iconMap.Zap;
  return <Icon className={className} size={18} />;
}

function PromptBlock({ prompt, copied, onCopy }) {
  return (
    <div className="relative group">
      <pre className="bg-gray-900/80 border border-gray-700/50 rounded-lg p-4 text-sm text-gray-300 whitespace-pre-wrap font-mono leading-relaxed max-h-64 overflow-y-auto">{prompt}</pre>
      <button onClick={onCopy} className="absolute top-3 right-3 p-1.5 rounded-md bg-gray-800 border border-gray-600/50 hover:bg-gray-700 transition-colors">
        {copied ? <icons.Check size={14} className="text-green-400" /> : <icons.Copy size={14} className="text-gray-400" />}
      </button>
    </div>
  );
}

function PostDetail({ post, onBack }) {
  const [copiedIdx, setCopiedIdx] = useState(null);
  const handleCopy = (text, idx) => {
    navigator.clipboard.writeText(text);
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 2000);
  };
  const isPromptType = post.items[0]?.prompt;
  return (
    <div className="min-h-screen bg-gray-950 text-white">
      <div className={`bg-gradient-to-br ${post.color} px-6 py-8`}>
        <button onClick={onBack} className="flex items-center gap-1.5 text-white/80 hover:text-white mb-6 text-sm font-medium transition-colors">
          <icons.ChevronLeft size={16} /> Back to all posts
        </button>
        <div className="max-w-3xl mx-auto">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xs font-semibold uppercase tracking-wider bg-white/20 px-2.5 py-1 rounded-full">{post.type}</span>
            <span className="text-xs text-white/70">{post.slides} slides</span>
          </div>
          <h1 className="text-3xl font-bold mb-2">{post.title}</h1>
          <p className="text-white/80 text-lg mb-4">{post.subtitle}</p>
          <div className="flex flex-wrap items-center gap-4 text-sm text-white/70">
            <span>{post.handle}</span>
            <span>{post.date}</span>
            <span>{post.engagement}</span>
            <a href={post.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 text-white/90 hover:text-white">
              View on IG <icons.ExternalLink size={12} />
            </a>
          </div>
          {post.gated && (
            <div className="mt-4 bg-white/10 border border-white/20 rounded-lg px-4 py-2.5 text-sm">
              <span className="font-semibold">Gated:</span> {post.gated}
            </div>
          )}
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-6 py-8">
        <div className="bg-gray-900/50 border border-gray-800 rounded-xl p-5 mb-8">
          <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Overview</h3>
          <p className="text-gray-300 leading-relaxed">{post.description}</p>
        </div>
        <h2 className="text-xl font-bold mb-6">{isPromptType ? `The ${post.items.length} Prompts` : `The ${post.items.length} Steps`}</h2>
        <div className="space-y-6">
          {post.items.map((item, idx) => (
            <div key={idx} className={`border ${post.borderColor} rounded-xl overflow-hidden bg-gray-900/30`}>
              <div className="px-5 py-4 flex items-start gap-3">
                <div className={`mt-0.5 w-8 h-8 rounded-lg ${post.bgAccent} flex items-center justify-center flex-shrink-0`}>
                  <IconComponent name={item.icon} className={post.iconColor} />
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-xs font-bold text-gray-500">{String(idx + 1).padStart(2, "0")}</span>
                    <h3 className="font-semibold text-white">{item.name}</h3>
                  </div>
                </div>
              </div>
              <div className="px-5 pb-5">
                {item.prompt ? (
                  <>
                    <PromptBlock prompt={item.prompt} copied={copiedIdx === idx} onCopy={() => handleCopy(item.prompt, idx)} />
                    <p className="mt-3 text-sm text-gray-400 leading-relaxed"><span className="font-semibold text-gray-300">How to use:</span> {item.howToUse}</p>
                  </>
                ) : (
                  <>
                    <p className="text-gray-300 text-sm leading-relaxed mb-3">{item.details}</p>
                    <div className={`${post.bgAccent} border ${post.borderColor} rounded-lg px-4 py-2.5 text-sm`}>
                      <span className={`font-semibold ${post.iconColor}`}>Key takeaway:</span>{" "}
                      <span className="text-gray-300">{item.keyPoint}</span>
                    </div>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PostCard({ post, onClick }) {
  return (
    <button onClick={onClick} className={`w-full text-left border ${post.borderColor} rounded-2xl overflow-hidden bg-gray-900/40 hover:bg-gray-900/70 transition-all duration-200 hover:scale-[1.01] group`}>
      <div className={`h-2 bg-gradient-to-r ${post.color}`} />
      <div className="p-6">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <div className={`w-9 h-9 rounded-full bg-gradient-to-br ${post.color} flex items-center justify-center`}>
              <icons.Instagram size={16} className="text-white" />
            </div>
            <div>
              <p className="text-sm font-semibold text-white">{post.handle}</p>
              <p className="text-xs text-gray-500">{post.date}</p>
            </div>
          </div>
          <span className="text-xs font-medium bg-gray-800 text-gray-400 px-2.5 py-1 rounded-full">{post.type}</span>
        </div>
        <h3 className="text-lg font-bold text-white mb-1 group-hover:text-gray-100">{post.title}</h3>
        <p className="text-sm text-gray-400 mb-4">{post.subtitle}</p>
        <p className="text-sm text-gray-500 leading-relaxed line-clamp-2 mb-4">{post.description}</p>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-3 text-xs text-gray-500">
            <span>{post.slides} slides</span>
            <span>{post.items.length} {post.items[0]?.prompt ? "prompts" : "steps"}</span>
          </div>
          <span className={`text-xs font-medium ${post.iconColor} group-hover:translate-x-0.5 transition-transform`}>View details &rarr;</span>
        </div>
      </div>
    </button>
  );
}

function App() {
  const [activePost, setActivePost] = useState(null);
  if (activePost) {
    return <PostDetail post={activePost} onBack={() => setActivePost(null)} />;
  }
  return (
    <div className="min-h-screen bg-gray-950 text-white">
      <div className="relative overflow-hidden">
        <div className="absolute inset-0 bg-gradient-to-br from-orange-500/5 via-purple-500/5 to-rose-500/5" />
        <div className="relative max-w-4xl mx-auto px-6 py-16 text-center">
          <div className="inline-flex items-center gap-2 bg-gray-800/60 border border-gray-700/50 rounded-full px-4 py-1.5 mb-6">
            <icons.Instagram size={14} className="text-pink-400" />
            <span className="text-xs font-medium text-gray-300">Instagram Content Breakdown</span>
          </div>
          <h1 className="text-4xl font-bold mb-3 bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
            Prompt & Playbook Vault
          </h1>
          <p className="text-gray-400 max-w-xl mx-auto leading-relaxed">
            Captured breakdowns from top AI creators on Instagram. Each card contains the full prompts, frameworks, and step-by-step instructions, ready to copy and execute.
          </p>
          <div className="flex items-center justify-center gap-6 mt-8 text-sm text-gray-500">
            <div className="flex items-center gap-1.5"><icons.Layers size={14} className="text-orange-400" /><span>{POSTS.length} posts captured</span></div>
            <div className="flex items-center gap-1.5"><icons.Zap size={14} className="text-purple-400" /><span>{POSTS.reduce((a, p) => a + p.items.length, 0)} prompts & steps</span></div>
          </div>
        </div>
      </div>
      <div className="max-w-4xl mx-auto px-6 pb-16">
        <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
          {POSTS.map((post) => (
            <PostCard key={post.id} post={post} onClick={() => setActivePost(post)} />
          ))}
          <div className="border border-dashed border-gray-700/50 rounded-2xl flex flex-col items-center justify-center p-8 text-center min-h-[280px]">
            <div className="w-12 h-12 rounded-full bg-gray-800/50 flex items-center justify-center mb-3">
              <icons.Instagram size={20} className="text-gray-600" />
            </div>
            <p className="text-sm font-medium text-gray-500 mb-1">Next Capture</p>
            <p className="text-xs text-gray-600">Share an IG link to add a new card</p>
          </div>
        </div>
      </div>
      <div className="border-t border-gray-800/50 py-6 text-center text-xs text-gray-600">
        Captured April 2026 &middot; Sources: @evolving.ai, @gauravhq.ai, @boss.bae.steph, @nishantchahar.ai
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
