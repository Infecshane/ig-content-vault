          { name: "Rule 2: Jab Jab Jab Right Hook", icon: "Megaphone", prompt: "I sell a digital product called [product name] on Instagram. Using Gary Vaynerchuk's jab jab jab right hook framework, create a 4-post content sequence for me. Post 1 (jab): pure value, teach something useful, no CTA. Post 2 (jab): relatable story that builds trust, no CTA. Post 3 (jab): myth busting content that positions me as the authority, soft CTA only. Post 4 (right hook): direct sell post for my digital product with a clear CTA to comment [keyword]. Write all 4 posts in full. Tone: warm, authentic, big sister energy.", howToUse: "Plug in your product name and keyword. Complete 4-post sales sequence: 3 value, 1 sell. Run weekly." },

                    ) : (
                      <>
                        <p className="text-gray-300 text-sm leading-relaxed mb-3">{item.details}</p>
                        <div className={`${post.bgAccent} border ${post.borderColor} rounded-lg px-4 py-2.5 text-sm`}>
                          <span className={`font-semibold ${post.iconColor}`}>Key takeaway:</span>{" "}
                          <span className="text-gray-300">{item.keyPoint}</span>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PostCard({ post, onClick }) {
      return (
        <button onClick={onClick} className={`w-full text-left border ${post.borderColor} rounded-2xl overflow-hidden bg-gray-900/40 hover:bg-gray-900/70 transition-all duration-200 hover:scale-[1.01] group`}>
          <div className={`h-2 bg-gradient-to-r ${post.color}`} />
          <div className="p-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <div className={`w-9 h-9 rounded-full bg-gradient-to-br ${post.color} flex items-center justify-center`}>
                  <icons.Instagram size={16} className="text-white" />
                </div>
                <div>
                  <p className="text-sm font-semibold text-white">{post.handle}</p>
                  <p className="text-xs text-gray-500">{post.date}</p>
                </div>
              </div>
              <span className="text-xs font-medium bg-gray-800 text-gray-400 px-2.5 py-1 rounded-full">{post.type}</span>
            </div>
            <h3 className="text-lg font-bold text-white mb-1 group-hover:text-gray-100">{post.title}</h3>
            <p className="text-sm text-gray-400 mb-4">{post.subtitle}</p>
            <p className="text-sm text-gray-500 leading-relaxed line-clamp-2 mb-4">{post.description}</p>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3 text-xs text-gray-500">
                <span>{post.slides} slides</span>
                <span>{post.items.length} {post.items[0]?.prompt ? "prompts" : "steps"}</span>
              </div>
              <span className={`text-xs font-medium ${post.iconColor} group-hover:translate-x-0.5 transition-transform`}>View details &rarr;</span>
            </div>
          </div>
        </button>
      );
    }

    function App() {
      const [activePost, setActivePost] = useState(null);
      if (activePost) {
        return <PostDetail post={activePost} onBack={() => setActivePost(null)} />;
      }
      return (
        <div className="min-h-screen bg-gray-950 text-white">
          <div className="relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-br from-orange-500/5 via-purple-500/5 to-rose-500/5" />
            <div className="relative max-w-4xl mx-auto px-6 py-16 text-center">
              <div className="inline-flex items-center gap-2 bg-gray-800/60 border border-gray-700/50 rounded-full px-4 py-1.5 mb-6">
                <icons.Instagram size={14} className="text-pink-400" />
                <span className="text-xs font-medium text-gray-300">Instagram Content Breakdown</span>
              </div>
              <h1 className="text-4xl font-bold mb-3 bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
                Prompt &amp; Playbook Vault
              </h1>
              <p className="text-gray-400 max-w-xl mx-auto leading-relaxed">
                Captured breakdowns from top AI creators on Instagram. Each card contains the full prompts, frameworks, and step-by-step instructions, ready to copy and execute.
              </p>
              <div className="flex items-center justify-center gap-6 mt-8 text-sm text-gray-500">
                <div className="flex items-center gap-1.5"><icons.Layers size={14} className="text-orange-400" /><span>{POSTS.length} posts captured</span></div>
                <div className="flex items-center gap-1.5"><icons.Zap size={14} className="text-purple-400" /><span>{POSTS.reduce((a, p) => a + p.items.length, 0)} prompts &amp; steps</span></div>
              </div>
            </div>
          </div>
          <div className="max-w-4xl mx-auto px-6 pb-16">
            <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
              {POSTS.map((post) => (
                <PostCard key={post.id} post={post} onClick={() => setActivePost(post)} />
              ))}
              <div className="border border-dashed border-gray-700/50 rounded-2xl flex flex-col items-center justify-center p-8 text-center min-h-[280px]">
                <div className="w-12 h-12 rounded-full bg-gray-800/50 flex items-center justify-center mb-3">
                  <icons.Instagram size={20} className="text-gray-600" />
                </div>
                <p className="text-sm font-medium text-gray-500 mb-1">Next Capture</p>
                <p className="text-xs text-gray-600">Share an IG link to add a new card</p>
              </div>
            </div>
          </div>
          <div className="border-t border-gray-800/50 py-6 text-center text-xs text-gray-600">
            Captured April 2026 &middot; Sources: @evolving.ai, @gauravhq.ai, @boss.bae.steph, @nishantchahar.ai, @entrepreneurshipquote, @leadgenman, @razvanpbusiness, @real_bruno_souza, @jaiswal_utkarsh99, @artificialzone, @miroslava.smith
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
